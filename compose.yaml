services:
  # ============================================
  # MariaDB - Datenbank für DNS Manager
  # ============================================
  mariadb:
    image: mariadb:11
    container_name: dns-manager-db
    restart: unless-stopped
    environment:
      # KEINE Default-Passwoerter! Wenn .env fehlt, soll MariaDB lieber
      # mit "MARIADB_ROOT_PASSWORD is empty" stoppen als sich mit einem
      # bekannten Default initialisieren.
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD ist leer – bitte .env aus .env.example anlegen oder ./setup.sh ausfuehren}
      MARIADB_DATABASE: ${DB_NAME:-dns_manager}
      MARIADB_USER: ${DB_USER:-dns_admin}
      MARIADB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD ist leer – bitte .env aus .env.example anlegen oder ./setup.sh ausfuehren}
    volumes:
      - mariadb_data:/var/lib/mysql
    # Bewusst KEIN ports:-Mapping nach außen.
    # Die Datenbank wird ausschließlich über das interne Docker-Netz "dns-manager-net" vom Backend erreicht.
    # Wenn du temporär von außen darauf zugreifen willst, lokal "ports: - 127.0.0.1:3307:3306" hinzufügen
    # – aber niemals 0.0.0.0:3307:3306 (das macht die DB öffentlich erreichbar).
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dns-manager-net

  # ============================================
  # FastAPI Backend + React Frontend
  # ============================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dns-manager-api
    restart: unless-stopped
    ports:
      - "5380:8000"
    environment:
      # Datenbank-Verbindung – DB_PASSWORD muss in .env gesetzt sein.
      DATABASE_URL: mysql+aiomysql://${DB_USER:-dns_admin}:${DB_PASSWORD:?DB_PASSWORD ist leer – bitte .env aus .env.example anlegen oder ./setup.sh ausfuehren}@mariadb:3306/${DB_NAME:-dns_manager}

      # PowerDNS Server (optional - kann auch über Admin-Panel eingerichtet werden)
      # Format: name|url|api_key,name|url|api_key
      PDNS_SERVERS: ${PDNS_SERVERS:-}

      # App Settings (Version = eine Stelle: VERSION-Datei im Projektroot)
      APP_NAME: ${APP_NAME:-DNS Manager}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Host-Pfad zum Projektordner (für Einstellungen → Updates: „cd …“) – aus .env (install.sh / setup.sh)
      INSTALL_PATH: ${INSTALL_PATH:-}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-de}

      # Generierte Passwörter / Secrets aus .env durchreichen
      ENABLE_REGISTRATION: ${ENABLE_REGISTRATION:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}

      # Auth-Cookies (HTTPS / SameSite / Lebensdauer)
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      AUTH_COOKIE_MAX_AGE: ${AUTH_COOKIE_MAX_AGE:-2592000}

      # CORS + API-Doku
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      DOCS_ENABLED: ${DOCS_ENABLED:-false}
      WEBHOOK_ALLOW_PRIVATE_URLS: ${WEBHOOK_ALLOW_PRIVATE_URLS:-false}
    volumes:
      # Logo und andere Uploads bleiben bei Updates erhalten
      - backend_uploads:/app/app/static_new/uploads
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # DNS für Auflösung externer Hosts (z. B. SMTP-Server wie smtp.gmail.com)
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - dns-manager-net

volumes:
  mariadb_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  dns-manager-net:
    driver: bridge
